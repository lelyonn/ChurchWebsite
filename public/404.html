<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function redirectToSpa(location) {
        var segments = location.pathname.split("/").filter(Boolean);
        var appRoutes = [
          "about",
          "schedule",
          "alpha",
          "sj",
          "homecell",
          "youth",
          "ckids",
          "powerhouse",
        ];
        var pathSegmentsToKeep =
          segments.length > 1 && appRoutes.indexOf(segments[0].toLowerCase()) === -1
            ? 1
            : 0;
        var basePath = location.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/");
        var routePath = location.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/")
          .replace(/&/g, "~and~");
        var search = location.search
          ? "&" + location.search.slice(1).replace(/&/g, "~and~")
          : "";

        location.replace(
          location.protocol +
            "//" +
            location.hostname +
            (location.port ? ":" + location.port : "") +
            basePath +
            "/?/" +
            routePath +
            search +
            location.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
