
  <!DOCTYPE html>
  <html lang="id">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>GEIS Christian Creative Church</title>
      <meta name="description" content="Website resmi GEIS Christian Creative Church di Solo: jadwal ibadah, program, komunitas, dan informasi kunjungan." />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        (function restoreGitHubPagesRoute(location) {
          if (location.search[1] !== "/") return;

          var decodedPath = location.search
            .slice(1)
            .split("&")
            .map(function (segment) {
              return segment.replace(/~and~/g, "&");
            })
            .join("?");

          window.history.replaceState(
            null,
            null,
            location.pathname.slice(0, -1) + decodedPath + location.hash
          );
        })(window.location);
      </script>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
